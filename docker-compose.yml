services:
  fritzbox-monitor:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - FRITZ_IP=${FRITZ_IP:-192.168.178.1}
      - FRITZ_USER=${FRITZ_USER:-}
      - FRITZ_PASSWORD=${FRITZ_PASSWORD}
      - POLL_INTERVAL_MINUTES=${POLL_INTERVAL_MINUTES:-60}
      - TZ=Europe/Berlin
    restart: unless-stopped
